<!DOCTYPE html>
<html>
<head>
    <title>Developer Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Developer Dashboard</h1>

    <div class="container">

        <input
            type="text"
            id="username"
            placeholder="Enter GitHub Username"
        >

        <button id="loadBtn">
            Load Dashboard
        </button>

        <div id="status"></div>

        <div id="profile"></div>

        <div id="weather"></div>

        <div id="quote"></div>

        <div id="time"></div>

    </div>

    <script src="script.js"></script>

</body>
</html>
