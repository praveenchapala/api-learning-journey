<!DOCTYPE html>
<html>
<head>
    <title>GitHub Profile Explorer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>GitHub Profile Explorer</h1>

    <div class="container">

        <input
            type="text"
            id="username"
            placeholder="Enter GitHub Username"
        >

        <button id="searchBtn">
            Search
        </button>

        <div id="status"></div>

        <div id="profile"></div>

        <div id="repos"></div>

    </div>

    <script src="script.js"></script>

</body>
</html>
